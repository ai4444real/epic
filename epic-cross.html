<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EPiC Cross View</title>
    <link rel="stylesheet" href="css/cross.css" />
</head>
<body>
  <div class="toolbar">
    <h1>EPiC Cross <span class="sub">Pattern + Interventi</span></h1>
    <div style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <a id="homeBtn" href="index.html" style="padding: 6px 16px; font: inherit; font-size: 13px; font-weight: 500; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: inherit; text-decoration: none;">Home</a>
      <button id="backBtn" onclick="showGrid()">Torna alle P</button>
    </div>
  </div>

  <div class="p-grid" id="pGrid"></div>

  <div class="cross-view" id="crossView">
    <div class="cross-layout" id="crossLayout">
      <div class="wing-slot top cross-top" onclick="toggleWing(this)">
        <div class="wing-tab">Cognitivo</div>
        <div class="card-container" id="wing-cog"></div>
      </div>
      <div class="wing-slot left cross-left" onclick="toggleWing(this)">
        <div class="wing-tab">Emotivo</div>
        <div class="card-container" id="wing-emo"></div>
      </div>
      <div class="cross-center" id="crossCenter"></div>
      <div class="wing-slot right cross-right" onclick="toggleWing(this)">
        <div class="wing-tab">Comportamentale</div>
        <div class="card-container" id="wing-comp"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app-config.js"></script>
  <script src="js/auth.js"></script>
    <script src="data/EPIC_data.js"></script>
    <script src="js/cross.js"></script>
</body>
</html>
