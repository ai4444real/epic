<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EPiC All Cards Viewer</title>
    <link rel="stylesheet" href="css/all-cards.css" />
</head>
<body>
  <div class="toolbar">
    <h1>EPiC All Cards <span class="sub">Viewer completo</span></h1>
    <div class="controls">
      <a href="index.html" style="font: inherit; border: 1px solid #e4e4e7; border-radius: 6px; padding: 6px 12px; background: #fff; color: inherit; text-decoration: none; font-size: 13px;">Home</a>
      <label>
        Carica EPIC_full.json:
        <input id="fileInput" type="file" accept="application/json" />
      </label>
      <button id="resetBtn" style="padding: 6px 16px; font: inherit; font-size: 13px; font-weight: 500; border: 1px solid #e4e4e7; border-radius: 6px; background: #fff; cursor: pointer; transition: all 0.15s ease; display: none;">
        ↺ Reset
      </button>
      <label>
        Mostra:
        <select id="filterType">
          <option value="all">Tutte le carte</option>
          <option value="E">Solo Emozioni (E)</option>
          <option value="P">Solo Pattern (P)</option>
          <option value="I">Solo Interventi (I)</option>
        </select>
      </label>
      <input id="search" type="search" placeholder="Cerca per ID o testo..." />
    </div>
  </div>

  <div class="stats" id="stats">
    Nessun file caricato
  </div>

  <div class="grid" id="grid">
    <div class="placeholder">
      <strong>Carica EPIC_full.json per iniziare</strong>
      Vedrai tutte le carte E, P e I in una griglia navigabile
    </div>
  </div>

    <script src="data/EPIC_data.js"></script>
    <script src="js/all-cards.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
