<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EPiC Login</title>
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
  <main class="shell">
    <section class="hero" style="max-width:720px; margin:80px auto 0;">
      <div class="eyebrow">Accesso</div>
      <h1>Entra in EPiC</h1>
      <p>Accesso riservato ai tester invitati. Se il login e' disabilitato, questa pagina non viene usata.</p>
      <div style="margin-top:24px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <button id="loginBtn" style="padding: 12px 18px; border-radius: 14px; border: 1px solid rgba(17,17,17,0.12); background: #fff; font: inherit; font-weight: 700; cursor: pointer;">
          Entra con Google
        </button>
        <a href="index.html" style="color: inherit; text-decoration: none; font-weight: 600;">Torna alla home</a>
      </div>
      <div id="loginError" style="margin-top:14px; color:#9f1239; min-height:24px;"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
